<!DOCTYPE html>

<html>
<head>
<title>Krazy Records Discography</title>

<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
    background-image: url('background.png');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    margin:0;
}

h1{
    color:white;
    text-shadow: 2px 2px 4px black;
    margin-top:30px;
}

input{
    width:300px;
    padding:10px;
    margin:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(4, 200px);
    justify-content:center;
    gap:30px;
}

.artist{
    text-align:center;
}

.artist img{
    width:200px;
    height:200px;
    object-fit:cover;
    border:3px solid black;
}

.artist-name{
    color:white;
    text-shadow: 2px 2px 4px black;
    margin-top:10px;
    font-weight:bold;
}
</style>

</head>

<body>

<h1>ARTISTS SIGNED TO KRAZY RECORDS</h1>

<input type="text" placeholder="Search Artists">

<div class="grid">

<div class="artist">
    <a href="Krackhed.html">
        <img src="krackhed.jpg">
    </a>
    <div class="artist-name">KRACK HED</div>
</div>

<div class="artist">
    <img src="krackhed.jpg">

</div>

</div>

<div class="artist">

</html>
