.grid{

.artist img{
    width:200px;
    height:200px;

    border:3px solid black;
    transition:0.2s;
}

.artist img:hover{
    transform:scale(1.05);
}

.artist-name{
    color:white;
    text-shadow: 2px 2px 4px black;
    margin-top:10px;
    font-weight:bold;
}
